<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Dice To-Do — let the die pick your next task</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  body {
    background: radial-gradient(1200px 800px at 50% -10%, #2a3050 0%, #141826 55%, #0b0e18 100%);
    color: #eef1f8;
  }
  #app { display: flex; flex-direction: column; height: 100vh; }

  /* ---- top 80%: master + today ---- */
  .top { flex: 4 1 0; min-height: 0; display: flex; gap: 14px; padding: 14px; }
  .col {
    flex: 1; min-width: 0; display: flex; flex-direction: column;
    background: rgba(22,27,42,0.55); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px; overflow: hidden;
  }
  .col-head {
    display: flex; align-items: center; gap: 10px; padding: 13px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .col-head h2 { margin: 0; font-size: 15px; letter-spacing: .4px; }
  .col-head .count { font-size: 12px; opacity: .55; }
  .col-head .die-badge {
    margin-left: auto; font-size: 12px; font-weight: 700; padding: 4px 9px;
    border-radius: 8px; background: rgba(255,255,255,0.08); letter-spacing: .5px;
  }
  .add-row { display: flex; gap: 8px; padding: 10px 12px; }
  .add-row input {
    flex: 1; min-width: 0; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
    color: #eef1f8; border-radius: 9px; padding: 9px 11px; font-size: 13px; outline: none;
  }
  .add-row input:focus { border-color: rgba(120,160,255,0.6); }
  .add-row button {
    border: 0; cursor: pointer; color: #0b0e18; font-weight: 800; font-size: 16px; line-height: 1;
    width: 38px; border-radius: 9px; background: linear-gradient(180deg, #9fd0ff, #5aa0ee);
  }

  .list { flex: 1; min-height: 0; overflow-y: auto; padding: 8px 10px 14px; list-style: none; margin: 0; }
  .list.dragover { background: rgba(120,160,255,0.06); }

  .task {
    display: flex; align-items: center; gap: 10px; padding: 10px 11px; margin: 6px 2px;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 11px; cursor: grab; transition: background .12s, transform .08s, opacity .15s;
  }
  .task:hover { background: rgba(255,255,255,0.09); }
  .task.dragging { opacity: .4; cursor: grabbing; }
  .task .txt { flex: 1; min-width: 0; font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .task .num {
    width: 22px; height: 22px; flex: none; display: grid; place-items: center;
    border-radius: 7px; font-size: 12px; font-weight: 800; background: rgba(255,255,255,0.12);
    font-variant-numeric: tabular-nums;
  }
  .task .x {
    flex: none; cursor: pointer; opacity: .4; font-size: 16px; line-height: 1; padding: 2px 4px; border-radius: 6px;
  }
  .task .x:hover { opacity: 1; background: rgba(255,80,80,0.25); }
  .task input[type=checkbox] { width: 18px; height: 18px; flex: none; accent-color: #4cd07a; cursor: pointer; }
  .task.done .txt { text-decoration: line-through; opacity: .5; }
  .task.highlight { outline: 2px solid #ffd34d; outline-offset: 1px; }

  .empty-hint { opacity: .4; font-size: 13px; text-align: center; padding: 24px 12px; line-height: 1.5; }

  /* ---- bottom 20%: dice ---- */
  .dice {
    flex: 1 1 0; min-height: 0; position: relative;
    border-top: 1px solid rgba(255,255,255,0.08);
  }
  #diceCanvas { position: absolute; inset: 0; }
  #diceCanvas canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  #diceCanvas canvas.grabbing { cursor: grabbing; }
  .dice-ui {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 8px; z-index: 5; pointer-events: none;
  }
  .dice-ui .lead { font-size: 12px; opacity: .65; pointer-events: none; }
  .dice-ui .roll-btn {
    pointer-events: auto; border: 0; cursor: pointer; color: #0b0e18; font-weight: 800; font-size: 14px;
    padding: 10px 16px; border-radius: 11px; background: linear-gradient(180deg, #ffe27a, #f4b740);
    box-shadow: 0 6px 18px rgba(244,183,64,.35);
  }
  .dice-ui .roll-btn:disabled { filter: grayscale(.7) brightness(.7); cursor: default; box-shadow: none; }
  .dice-hint {
    position: absolute; right: 16px; bottom: 10px; font-size: 11px; opacity: .5; z-index: 5; pointer-events: none;
  }

  /* ---- result overlay ---- */
  .overlay {
    position: fixed; inset: 0; z-index: 50; display: none; place-items: center;
    background: rgba(6,8,16,0.66); backdrop-filter: blur(4px);
  }
  .overlay.show { display: grid; }
  .card {
    width: min(440px, 86vw); text-align: center; padding: 30px 28px;
    background: linear-gradient(180deg, #1c2236, #141826);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 20px; box-shadow: 0 24px 70px rgba(0,0,0,.6);
    animation: pop .25s ease;
  }
  @keyframes pop { from { transform: scale(.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .card .roll-num { font-size: 13px; letter-spacing: 2px; text-transform: uppercase; opacity: .55; }
  .card .pick { font-size: 26px; font-weight: 800; margin: 10px 0 22px; line-height: 1.25; }
  .card .pick.again { color: #ff9d6e; }
  .card .btns { display: flex; gap: 10px; justify-content: center; }
  .card button {
    border: 0; cursor: pointer; font-weight: 700; font-size: 14px; padding: 11px 18px; border-radius: 11px;
  }
  .card .primary { color: #0b0e18; background: linear-gradient(180deg, #8fe0a8, #4cd07a); }
  .card .accent { color: #0b0e18; background: linear-gradient(180deg, #ffe27a, #f4b740); }
  .card .ghost { color: #cfd6e8; background: rgba(255,255,255,0.08); }

  .loading { position: fixed; inset: 0; display: grid; place-items: center; z-index: 80; background: #0b0e18; }

  /* ---- user bar (in the master header) ---- */
  .userbar { margin-left: auto; display: flex; align-items: center; gap: 8px; font-size: 12px; }
  .userbar .who { opacity: .7; }
  .userbar .who b { opacity: 1; font-weight: 700; }
  .userbar button {
    appearance: none; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
    color: #dfe4f2; font-size: 12px; font-weight: 600; padding: 5px 10px; border-radius: 8px; cursor: pointer;
  }
  .userbar button:hover { background: rgba(255,255,255,0.12); }
  .userbar .admin-only { display: none; }
  body.is-admin .userbar .admin-only { display: inline-block; }

  /* ---- login screen ---- */
  .login {
    position: fixed; inset: 0; z-index: 90; display: none; place-items: center;
    background: radial-gradient(1200px 800px at 50% -10%, #2a3050 0%, #141826 55%, #0b0e18 100%);
  }
  .login.show { display: grid; }
  .login form {
    width: min(360px, 88vw); padding: 30px 28px; text-align: center;
    background: rgba(22,27,42,0.72); backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.6);
  }
  .login h1 { margin: 0 0 4px; font-size: 22px; }
  .login .sub { font-size: 12px; opacity: .55; margin-bottom: 20px; }
  .login input {
    display: block; width: 100%; margin: 10px 0; padding: 11px 12px; font-size: 14px;
    background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 10px;
    color: #eef1f8; outline: none;
  }
  .login input:focus { border-color: rgba(120,160,255,0.6); }
  .login button[type=submit] {
    width: 100%; margin-top: 8px; padding: 12px; border: 0; border-radius: 10px; cursor: pointer;
    font-weight: 800; font-size: 15px; color: #0b0e18; background: linear-gradient(180deg, #9fd0ff, #5aa0ee);
  }
  .login .err { color: #ff8e7a; font-size: 13px; min-height: 18px; margin-top: 12px; }

  /* ---- admin users modal ---- */
  .modal { position: fixed; inset: 0; z-index: 70; display: none; place-items: center;
           background: rgba(6,8,16,0.66); backdrop-filter: blur(4px); }
  .modal.show { display: grid; }
  .modal .sheet {
    width: min(460px, 90vw); max-height: 80vh; overflow: auto; padding: 22px 22px 18px;
    background: linear-gradient(180deg, #1c2236, #141826);
    border: 1px solid rgba(255,255,255,0.10); border-radius: 18px; box-shadow: 0 24px 70px rgba(0,0,0,.6);
  }
  .modal .sheet h2 { margin: 0 0 14px; font-size: 17px; }
  .modal .ulist { list-style: none; margin: 0 0 14px; padding: 0; }
  .modal .ulist li {
    display: flex; align-items: center; gap: 10px; padding: 9px 11px; margin: 6px 0;
    background: rgba(255,255,255,0.045); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px;
  }
  .modal .ulist .uname { flex: 1; font-size: 14px; }
  .modal .ulist .urole { font-size: 11px; text-transform: uppercase; letter-spacing: .5px; opacity: .6; }
  .modal .ulist .badge-you { font-size: 11px; opacity: .5; }
  .modal .ulist .rm { cursor: pointer; border: 0; background: rgba(255,80,80,0.18); color: #ffb3a8;
                      border-radius: 7px; padding: 4px 9px; font-size: 12px; font-weight: 700; }
  .modal .ulist .rm:hover { background: rgba(255,80,80,0.32); }
  .modal .addform { display: grid; grid-template-columns: 1fr 1fr auto auto; gap: 8px; align-items: center;
                    border-top: 1px solid rgba(255,255,255,0.08); padding-top: 14px; }
  .modal .addform input, .modal .addform select {
    padding: 9px 10px; font-size: 13px; background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12); border-radius: 9px; color: #eef1f8; outline: none; min-width: 0;
  }
  .modal .addform button { border: 0; cursor: pointer; font-weight: 800; color: #0b0e18;
                           background: linear-gradient(180deg, #8fe0a8, #4cd07a); border-radius: 9px; padding: 9px 12px; }
  .modal .row-end { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .modal .err { color: #ff8e7a; font-size: 12px; min-height: 16px; }
  .modal .close { border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.05);
                  color: #cfd6e8; border-radius: 9px; padding: 8px 14px; cursor: pointer; font-weight: 700; }
</style>
</head>
<body>
  <div id="app">
    <div class="top">
      <!-- Master backlog -->
      <div class="col">
        <div class="col-head">
          <h2>Master list</h2><span class="count" id="masterCount"></span>
          <div class="userbar">
            <span class="who">Signed in as <b id="whoName">—</b></span>
            <button class="admin-only" id="usersBtn" title="Manage users">Users</button>
            <button id="logoutBtn" title="Log out">Log out</button>
          </div>
        </div>
        <div class="add-row">
          <input id="masterInput" type="text" placeholder="Add a task and press Enter…" />
          <button id="masterAdd" title="Add">+</button>
        </div>
        <ul class="list" id="masterList"></ul>
      </div>

      <!-- Today -->
      <div class="col">
        <div class="col-head">
          <h2>Today</h2><span class="count" id="dailyCount"></span>
          <span class="die-badge" id="dieBadge">d4</span>
        </div>
        <ul class="list" id="dailyList"></ul>
      </div>
    </div>

    <!-- Dice -->
    <div class="dice">
      <div id="diceCanvas"></div>
      <div class="dice-ui">
        <span class="lead" id="diceLead">Picking from 1–0</span>
        <button class="roll-btn" id="rollBtn">Roll ⤴</button>
      </div>
      <div class="dice-hint">Grab the die, swipe &amp; release to throw</div>
    </div>
  </div>

  <!-- Result overlay -->
  <div class="overlay" id="overlay">
    <div class="card">
      <div class="roll-num" id="ovRoll">You rolled</div>
      <div class="pick" id="ovPick">—</div>
      <div class="btns" id="ovBtns"></div>
    </div>
  </div>

  <!-- Login screen -->
  <div class="login" id="loginScreen">
    <form id="loginForm" autocomplete="on">
      <h1>Dice To-Do</h1>
      <div class="sub">Sign in to continue</div>
      <input id="loginUser" name="username" type="text" placeholder="Username" autocomplete="username" required />
      <input id="loginPass" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
      <button type="submit">Log in</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>

  <!-- Admin: user management -->
  <div class="modal" id="usersModal">
    <div class="sheet">
      <h2>Users</h2>
      <ul class="ulist" id="usersList"></ul>
      <form class="addform" id="addUserForm">
        <input id="newUser" type="text" placeholder="username" required />
        <input id="newPass" type="password" placeholder="password (min 6)" required />
        <select id="newRole"><option value="user">user</option><option value="admin">admin</option></select>
        <button type="submit">Add</button>
      </form>
      <div class="row-end">
        <span class="err" id="usersErr"></span>
        <button class="close" id="usersClose">Close</button>
      </div>
    </div>
  </div>

  <div class="loading" id="loading">Loading…</div>

<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';
import RAPIER from 'https://esm.sh/@dimforge/rapier3d-compat@0.14.0';
await RAPIER.init();

/* =====================================================================
   DICE ENGINE  (embeddable; programmatic die-type + result callback)
   ===================================================================== */
const Dice = (() => {
  const HOLD_Y = 1.4;
  const DIE_SCALE = 0.62;        // dice are scaled down to sit comfortably in the strip
  const FRAME_DEPTH = 2.9;       // orthographic half-height (world units) — controls zoom
  const COS_TILT = 0.941;        // cos of the camera's tilt from straight-down (~20°)
  // Visible world half-extents at y=0; recomputed on every resize so the walls
  // can be snapped to the viewport edges (die can never roll off-screen).
  let halfX = 8, halfZ = 2.4;
  const mount = document.getElementById('diceCanvas');

  const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  mount.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  // Orthographic — no perspective distortion (the panel is very wide/short, which
  // would give a perspective camera a fisheye-wide horizontal FOV). Slight tilt
  // keeps a sense of 3D while the projection stays rectilinear.
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 100);
  camera.position.set(0, 9.5, 3.4);
  camera.lookAt(0, 0, 0);

  scene.add(new THREE.HemisphereLight(0xbcd0ff, 0x202840, 0.9));
  const keyLight = new THREE.DirectionalLight(0xffffff, 1.5);
  keyLight.position.set(4, 12, 6);
  keyLight.castShadow = true;
  keyLight.shadow.mapSize.set(2048, 2048);
  keyLight.shadow.camera.near = 1; keyLight.shadow.camera.far = 40;
  keyLight.shadow.camera.left = -10; keyLight.shadow.camera.right = 10;
  keyLight.shadow.camera.top = 8; keyLight.shadow.camera.bottom = -8;
  keyLight.shadow.bias = -0.0004;
  scene.add(keyLight);
  scene.add(new THREE.AmbientLight(0xffffff, 0.2));

  const tableMat = new THREE.MeshStandardMaterial({ color: 0x16623a, roughness: 0.95 });
  // Felt extends well past any viewport so the panel is always filled, not voided.
  const table = new THREE.Mesh(new THREE.BoxGeometry(260, 0.5, 60), tableMat);
  table.position.y = -0.25; table.receiveShadow = true; scene.add(table);

  const world = new RAPIER.World({ x: 0, y: -38, z: 0 });
  world.timestep = 1 / 60;
  const staticBody = world.createRigidBody(RAPIER.RigidBodyDesc.fixed());
  // Large floor (covers any viewport); walls are rebuilt on resize to the edges.
  world.createCollider(RAPIER.ColliderDesc.cuboid(140, 0.5, 40).setTranslation(0, -0.5, 0).setFriction(0.9).setRestitution(0.2), staticBody);

  let wallColliders = [];
  function rebuildWalls() {
    for (const c of wallColliders) world.removeCollider(c, false);
    wallColliders = [];
    const add = (hx, hy, hz, x, y, z) => wallColliders.push(
      world.createCollider(RAPIER.ColliderDesc.cuboid(hx, hy, hz).setTranslation(x, y, z).setFriction(0.85).setRestitution(0.25), staticBody));
    // Inner faces sit exactly at ±halfX / ±halfZ (the visible edges).
    add(0.5, 3, halfZ + 1, halfX + 0.5, 3, 0);
    add(0.5, 3, halfZ + 1, -(halfX + 0.5), 3, 0);
    add(halfX + 1, 3, 0.5, 0, 3, halfZ + 0.5);
    add(halfX + 1, 3, 0.5, 0, 3, -(halfZ + 0.5));
  }

  /* ---- number textures ---- */
  function makeNumberTexture(n) {
    const c = document.createElement('canvas'); c.width = c.height = 128;
    const ctx = c.getContext('2d');
    let fs = 86; ctx.font = `bold ${fs}px Arial`;
    while (ctx.measureText('' + n).width > 96 && fs > 22) { fs -= 4; ctx.font = `bold ${fs}px Arial`; }
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const s = '' + n;
    ctx.lineWidth = fs * 0.14; ctx.strokeStyle = 'rgba(0,0,0,0.55)'; ctx.strokeText(s, 64, 66);
    ctx.fillStyle = '#fff'; ctx.fillText(s, 64, 66);
    if (n === 6 || n === 9) {
      const w = ctx.measureText(s).width;
      ctx.lineWidth = 7; ctx.strokeStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(64 - w / 2, 66 + fs * 0.44); ctx.lineTo(64 + w / 2, 66 + fs * 0.44); ctx.stroke();
    }
    const tex = new THREE.CanvasTexture(c); tex.anisotropy = 4; tex.needsUpdate = true; return tex;
  }

  function extractFaces(geoIn) {
    const geo = geoIn.index ? geoIn.toNonIndexed() : geoIn;
    const pos = geo.getAttribute('position');
    const a = new THREE.Vector3(), b = new THREE.Vector3(), c = new THREE.Vector3();
    const ab = new THREE.Vector3(), ac = new THREE.Vector3(), n = new THREE.Vector3();
    const groups = [];
    for (let i = 0; i < pos.count; i += 3) {
      a.fromBufferAttribute(pos, i); b.fromBufferAttribute(pos, i + 1); c.fromBufferAttribute(pos, i + 2);
      ab.subVectors(b, a); ac.subVectors(c, a); n.crossVectors(ab, ac).normalize();
      let g = groups.find(gr => gr.normal.dot(n) > 0.99);
      if (!g) { g = { normal: n.clone(), verts: [] }; groups.push(g); }
      g.verts.push(a.clone(), b.clone(), c.clone());
    }
    const faces = [], hull = [], seen = new Set();
    for (const g of groups) {
      const center = new THREE.Vector3();
      for (const v of g.verts) center.add(v);
      center.multiplyScalar(1 / g.verts.length);
      const normal = g.normal.clone();
      if (normal.dot(center) < 0) normal.negate();
      let minD = Infinity;
      for (const v of g.verts) minD = Math.min(minD, center.distanceTo(v));
      faces.push({ center, normal, size: minD });
      for (const v of g.verts) {
        const k = `${v.x.toFixed(3)},${v.y.toFixed(3)},${v.z.toFixed(3)}`;
        if (!seen.has(k)) { seen.add(k); hull.push(v.x, v.y, v.z); }
      }
    }
    if (geo !== geoIn) geo.dispose();
    return { faces, hull: new Float32Array(hull) };
  }

  function buildD10() {
    const r = 1.0, e = 0.17, ay = 0.96;
    const E = [];
    for (let k = 0; k < 10; k++) {
      const ang = (k * 36) * Math.PI / 180, y = (k % 2 === 0) ? e : -e;
      E.push(new THREE.Vector3(r * Math.cos(ang), y, r * Math.sin(ang)));
    }
    const N = new THREE.Vector3(0, ay, 0), S = new THREE.Vector3(0, -ay, 0);
    const positions = [], faces = [], hull = [];
    const pushTri = (p, q, s) => positions.push(p.x, p.y, p.z, q.x, q.y, q.z, s.x, s.y, s.z);
    for (let k = 0; k < 10; k++) {
      const apex = (k % 2 === 0) ? N : S;
      const a = E[(k + 9) % 10], b = E[k], cc = E[(k + 1) % 10];
      pushTri(apex, a, b); pushTri(apex, b, cc);
      const center = new THREE.Vector3().add(apex).add(a).add(b).add(cc).multiplyScalar(0.25);
      const n1 = new THREE.Vector3().subVectors(a, apex).cross(new THREE.Vector3().subVectors(b, apex));
      const n2 = new THREE.Vector3().subVectors(b, apex).cross(new THREE.Vector3().subVectors(cc, apex));
      const normal = n1.clone().add(n2).normalize();
      if (normal.dot(center) < 0) normal.negate();
      const size = Math.min(center.distanceTo(a), center.distanceTo(b), center.distanceTo(cc));
      const tn = n1.clone().normalize();
      if (tn.dot(normal) < 0) tn.negate();
      const inside = tn.dot(apex) - tn.dot(center);
      const t = Math.max(0, inside / Math.max(tn.dot(normal), 1e-3));
      const labelPos = center.clone().addScaledVector(normal, t + 0.02);
      faces.push({ center, normal, size, labelPos });
    }
    for (const v of [N, S, ...E]) hull.push(v.x, v.y, v.z);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
    geo.computeVertexNormals();
    return { geometry: geo, faces, hull: new Float32Array(hull) };
  }

  const DEFS = {
    d4:  { color: 0xe74c3c, geo: () => new THREE.TetrahedronGeometry(1.05) },
    d6:  { color: 0x3498db, geo: () => new THREE.BoxGeometry(1.5, 1.5, 1.5) },
    d8:  { color: 0x2ecc71, geo: () => new THREE.OctahedronGeometry(1.15) },
    d10: { color: 0x9b59b6, custom: buildD10 },
    d12: { color: 0xe67e22, geo: () => new THREE.DodecahedronGeometry(1.15) },
    d20: { color: 0x1abc9c, geo: () => new THREE.IcosahedronGeometry(1.2) },
  };

  function buildDie(type) {
    const def = DEFS[type];
    let geometry, faces, hull;
    if (def.custom) ({ geometry, faces, hull } = def.custom());
    else { geometry = def.geo(); const ex = extractFaces(geometry); faces = ex.faces; hull = ex.hull; }
    // Uniformly scale everything down (geometry, face data and hull together).
    const s = DIE_SCALE;
    geometry.scale(s, s, s);
    faces.forEach(f => { f.center.multiplyScalar(s); if (f.labelPos) f.labelPos.multiplyScalar(s); f.size *= s; });
    for (let i = 0; i < hull.length; i++) hull[i] *= s;
    faces.sort((A, B) => B.normal.y - A.normal.y || B.normal.x - A.normal.x || B.normal.z - A.normal.z);
    faces.forEach((f, i) => f.value = i + 1);

    const mesh = new THREE.Mesh(geometry, new THREE.MeshStandardMaterial({
      color: def.color, roughness: 0.34, metalness: 0.12, flatShading: true, side: THREE.DoubleSide,
    }));
    mesh.castShadow = true;

    const labels = [], up = new THREE.Vector3(0, 0, 1);
    for (const f of faces) {
      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(f.size * 1.05, f.size * 1.05),
        new THREE.MeshBasicMaterial({ map: makeNumberTexture(f.value), transparent: true, depthWrite: false })
      );
      if (f.labelPos) plane.position.copy(f.labelPos);
      else plane.position.copy(f.center).addScaledVector(f.normal, 0.014);
      plane.quaternion.setFromUnitVectors(up, f.normal.clone().normalize());
      plane.renderOrder = 2; plane.userData.face = f;
      mesh.add(plane); labels.push(plane);
    }
    let circum = 0;
    for (let i = 0; i < hull.length; i += 3) circum = Math.max(circum, Math.hypot(hull[i], hull[i + 1], hull[i + 2]));
    return { mesh, faces, hull, labels, circum, type };
  }

  let die = null, body = null, state = 'idle', lowFrames = 0, throwTime = 0, currentType = null;
  let userRoll = false;            // only user-initiated rolls fire the result callback
  let resultCb = () => {};

  function disposeDie() {
    if (!die) return;
    if (body) { world.removeRigidBody(body); body = null; }
    scene.remove(die.mesh); die.mesh.geometry.dispose(); die.mesh.material.dispose();
    for (const l of die.labels) { l.geometry.dispose(); l.material.map.dispose(); l.material.dispose(); }
    die = null;
  }

  function spawnDie(type) {
    disposeDie();
    die = buildDie(type); currentType = type;
    scene.add(die.mesh);
    const desc = RAPIER.RigidBodyDesc.dynamic().setTranslation(rnd(-1, 1) * Math.min(2, halfX * 0.3), die.circum + 1.4, 0)
      .setLinearDamping(0.15).setAngularDamping(0.18).setCcdEnabled(true);
    body = world.createRigidBody(desc);
    world.createCollider(RAPIER.ColliderDesc.convexHull(die.hull).setFriction(0.9).setRestitution(0.18).setDensity(1.2), body);
    body.setAngvel(rndSpin(7), true);
    body.setLinvel({ x: rnd(-1.5, 1.5), y: 0, z: rnd(-1, 1) }, true);
    userRoll = false; state = 'rolling'; lowFrames = 0; throwTime = performance.now();
  }

  function readResult() {
    const q = die.mesh.quaternion, dir = die.type === 'd4' ? -1 : 1;
    let best = -Infinity, winner = null; const wn = new THREE.Vector3();
    for (const l of die.labels) {
      wn.copy(l.userData.face.normal).applyQuaternion(q);
      const s = wn.y * dir;
      if (s > best) { best = s; winner = l; }
    }
    return winner;
  }

  function settle() {
    state = 'idle';
    const winner = readResult();
    for (const l of die.labels) l.scale.setScalar(1);
    winner.scale.setScalar(1.45);
    setTimeout(() => { if (die && die.labels.includes(winner)) winner.scale.setScalar(1); }, 800);
    if (userRoll) { userRoll = false; resultCb(winner.userData.face.value); }
  }

  /* ---- throwing ---- */
  const raycaster = new THREE.Raycaster(), ndc = new THREE.Vector2();
  const holdPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), -HOLD_Y);
  const holdTarget = new THREE.Vector3(0, HOLD_Y, 0);
  let heldEuler = 0, samples = [];
  const canvas = renderer.domElement;

  function setNDC(e) {
    const r = canvas.getBoundingClientRect();
    ndc.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    ndc.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  }
  function pointToHold(e) {
    setNDC(e); raycaster.setFromCamera(ndc, camera);
    const p = new THREE.Vector3();
    if (!raycaster.ray.intersectPlane(holdPlane, p)) return null;
    const r = die ? die.circum : 0.8;
    p.x = Math.max(-halfX + r, Math.min(halfX - r, p.x));
    p.z = Math.max(-halfZ + r, Math.min(halfZ - r, p.z));
    p.y = HOLD_Y; return p;
  }
  function overDie(e) {
    if (!die) return false;
    setNDC(e); raycaster.setFromCamera(ndc, camera);
    return raycaster.intersectObject(die.mesh, true).length > 0;
  }

  canvas.addEventListener('pointerdown', (e) => {
    if (!die || state === 'held' || !overDie(e)) return;
    e.preventDefault(); canvas.setPointerCapture(e.pointerId); canvas.classList.add('grabbing');
    state = 'held';
    body.setBodyType(RAPIER.RigidBodyType.KinematicPositionBased, true);
    const p = pointToHold(e) || holdTarget; holdTarget.copy(p);
    samples = [{ x: p.x, z: p.z, t: performance.now() }];
  });
  canvas.addEventListener('pointermove', (e) => {
    if (state !== 'held') return;
    const p = pointToHold(e); if (!p) return;
    holdTarget.copy(p);
    samples.push({ x: p.x, z: p.z, t: performance.now() });
    while (samples.length > 12) samples.shift();
  });
  function release(e) {
    if (state !== 'held') return;
    canvas.classList.remove('grabbing');
    try { canvas.releasePointerCapture(e.pointerId); } catch (_) {}
    const now = performance.now();
    const cur = samples[samples.length - 1] || { x: holdTarget.x, z: holdTarget.z, t: now };
    let old = samples[0];
    for (const s of samples) { if (now - s.t <= 120) { old = s; break; } }
    const dt = Math.max((now - old.t) / 1000, 0.016);
    let vx = (cur.x - old.x) / dt, vz = (cur.z - old.z) / dt;
    let speed = Math.hypot(vx, vz); const MAX = 26;
    if (speed > MAX) { vx *= MAX / speed; vz *= MAX / speed; speed = MAX; }
    if (speed < 2.5) { const a = rnd(0, Math.PI * 2); vx = Math.cos(a) * 4; vz = Math.sin(a) * 4; speed = 4; }
    body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
    body.setLinvel({ x: vx, y: Math.min(1.2 + speed * 0.1, 2.8), z: vz }, true);
    body.setAngvel(rndSpin(10 + speed * 1.3), true);
    userRoll = true; state = 'rolling'; lowFrames = 0; throwTime = now;
  }
  canvas.addEventListener('pointerup', release);
  canvas.addEventListener('pointercancel', release);

  function autoRoll() {
    if (!die || state === 'held') return;
    const r = die.circum;
    const startX = -Math.min(halfX - r, 4);                 // launch from the left, throw right
    body.setBodyType(RAPIER.RigidBodyType.Dynamic, true);
    body.setTranslation({ x: startX, y: HOLD_Y, z: rnd(-0.4, 0.4) }, true);
    body.setLinvel({ x: rnd(11, 17), y: rnd(0.8, 1.8), z: rnd(-2.2, 2.2) }, true);
    body.setAngvel(rndSpin(22), true);
    userRoll = true; state = 'rolling'; lowFrames = 0; throwTime = performance.now();
  }

  function rnd(a, b) { return a + Math.random() * (b - a); }
  function rndSpin(m) {
    const v = new THREE.Vector3(rnd(-1, 1), rnd(-1, 1), rnd(-1, 1)).normalize().multiplyScalar(m);
    return { x: v.x, y: v.y, z: v.z };
  }

  const tmpQ = new THREE.Quaternion();
  function animate() {
    requestAnimationFrame(animate);
    if (state === 'held' && body) {
      body.setNextKinematicTranslation(holdTarget);
      heldEuler += 0.42;        // fast tumble while held, so the landing orientation is well randomized
      tmpQ.setFromEuler(new THREE.Euler(heldEuler * 0.73, heldEuler, heldEuler * 0.41));
      body.setNextKinematicRotation({ x: tmpQ.x, y: tmpQ.y, z: tmpQ.z, w: tmpQ.w });
    }
    world.step();
    if (body) {
      const t = body.translation(), r = body.rotation();
      die.mesh.position.set(t.x, t.y, t.z); die.mesh.quaternion.set(r.x, r.y, r.z, r.w);
    }
    if (state === 'rolling' && body) {
      const lv = body.linvel(), av = body.angvel();
      if (Math.hypot(lv.x, lv.y, lv.z) < 0.18 && Math.hypot(av.x, av.y, av.z) < 0.25) lowFrames++; else lowFrames = 0;
      if (lowFrames > 28 || performance.now() - throwTime > 9000) settle();
    }
    renderer.render(scene, camera);
  }

  function resize() {
    const w = mount.clientWidth || 1, h = mount.clientHeight || 1;
    renderer.setSize(w, h);          // updateStyle=true: canvas CSS size = pane size (fixes HiDPI overflow)
    const aspect = w / h;
    camera.top = FRAME_DEPTH; camera.bottom = -FRAME_DEPTH;
    camera.left = -FRAME_DEPTH * aspect; camera.right = FRAME_DEPTH * aspect;
    camera.updateProjectionMatrix();

    // Visible world half-extents at y=0, snapped inside the edges.
    halfX = FRAME_DEPTH * aspect - 0.5;
    // vertical screen maps to world Z foreshortened by the tilt; keep margin for
    // the die's bounce height so a tumbling die never pokes past the top/bottom edge.
    halfZ = (FRAME_DEPTH / COS_TILT) * 0.72 - 0.25;
    rebuildWalls();

    // If a resize shrank the arena past the die, pull it back into view.
    if (body) {
      const t = body.translation(), r = die ? die.circum : 0.8;
      const nx = Math.max(-halfX + r, Math.min(halfX - r, t.x));
      const nz = Math.max(-halfZ + r, Math.min(halfZ - r, t.z));
      if (nx !== t.x || nz !== t.z) body.setTranslation({ x: nx, y: Math.max(t.y, r), z: nz }, true);
    }
  }
  new ResizeObserver(resize).observe(mount);
  resize();
  animate();

  // Project the die's world AABB to NDC — used by automated containment checks.
  function screenBoundsNDC() {
    if (!die) return null;
    die.mesh.updateWorldMatrix(true, false);
    const box = new THREE.Box3().setFromObject(die.mesh);
    let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
    const v = new THREE.Vector3();
    for (let i = 0; i < 8; i++) {
      v.set(i & 1 ? box.max.x : box.min.x, i & 2 ? box.max.y : box.min.y, i & 4 ? box.max.z : box.min.z).project(camera);
      minX = Math.min(minX, v.x); maxX = Math.max(maxX, v.x);
      minY = Math.min(minY, v.y); maxY = Math.max(maxY, v.y);
    }
    return { minX, maxX, minY, maxY };
  }

  return {
    setType(type) { if (type !== currentType) spawnDie(type); },
    roll: autoRoll,
    onResult(cb) { resultCb = cb; },
    isBusy: () => state !== 'idle',
    getType: () => currentType,
    screenBoundsNDC,
  };
})();

/* =====================================================================
   TO-DO APP
   ===================================================================== */
document.getElementById('loading').remove();

const MAX_DAILY = 20;
let uid = 0;
function mk(text) { return { id: 'i' + Date.now().toString(36) + (uid++), text }; }

const API = '/api/state';
const SEED = ['Email Bob about the proposal', 'Write the spec doc', 'Fix the login bug',
              'Review PR #214', 'Water the plants', 'Plan sprint demo'];

// Persistence: write-through to the per-user state on the Axum/SQLite backend
// on every change. Saves are chained so a slow request can't clobber newer
// state; a 401 means the session lapsed → bounce back to the login screen.
let saveChain = Promise.resolve();
function save() {
  saveChain = saveChain.then(() =>
    fetch(API, { method: 'PUT', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ master: state.master, daily: state.daily }) })
      .then(r => { if (r.status === 401) { showLogin(); return; }
                   if (!r.ok) throw new Error('HTTP ' + r.status); })
      .catch(err => { console.warn('save failed, caching locally', err);
                      localStorage.setItem('diceTodo', JSON.stringify(state)); })
  );
}

// One state object, mutated in place (never reassigned) so drag/drop zones and
// window.__app keep valid array references.
const state = { master: [], daily: [] };
function applyState(loaded) {
  state.master.splice(0, state.master.length, ...(loaded.master || []));
  state.daily.splice(0, state.daily.length, ...(loaded.daily || []));
}

function dieForCount(n) {
  if (n <= 4) return 'd4';
  if (n <= 6) return 'd6';
  if (n <= 8) return 'd8';
  if (n <= 10) return 'd10';
  if (n <= 12) return 'd12';
  return 'd20';
}

const el = (id) => document.getElementById(id);
const masterList = el('masterList'), dailyList = el('dailyList');

function findItem(id) {
  let idx = state.master.findIndex(t => t.id === id);
  if (idx >= 0) return { list: state.master, idx };
  idx = state.daily.findIndex(t => t.id === id);
  if (idx >= 0) return { list: state.daily, idx };
  return null;
}

function moveItem(id, targetList, targetIdx) {
  const found = findItem(id); if (!found) return;
  const [item] = found.list.splice(found.idx, 1);
  // adjust index if removing from the same list shifted positions
  if (found.list === targetList && found.idx < targetIdx) targetIdx--;
  if (targetList === state.daily && targetList.length >= MAX_DAILY) {
    found.list.splice(found.idx, 0, item);   // put it back; daily is full
    flashDie(`Today is full (max ${MAX_DAILY})`);
    return;
  }
  targetList.splice(Math.max(0, Math.min(targetIdx, targetList.length)), 0, item);
  commit();
}

function commit() { save(); render(); syncDie(); }

function syncDie() {
  const type = dieForCount(state.daily.length || 1);
  Dice.setType(type);
  el('dieBadge').textContent = type;
  el('diceLead').textContent = state.daily.length
    ? `Picking from 1–${state.daily.length}` : 'Add tasks to Today';
  el('rollBtn').disabled = state.daily.length === 0;
}

/* ---- rendering ---- */
function taskEl(item, opts) {
  const li = document.createElement('li');
  li.className = 'task'; li.draggable = true; li.dataset.id = item.id;
  if (opts.numbered) {
    const num = document.createElement('span');
    num.className = 'num'; num.textContent = opts.index + 1; li.appendChild(num);
  }
  if (opts.checkbox) {
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.addEventListener('change', () => completeDaily(item.id, li));
    li.appendChild(cb);
  }
  const txt = document.createElement('span');
  txt.className = 'txt'; txt.textContent = item.text; txt.title = item.text;
  li.appendChild(txt);

  const x = document.createElement('span');
  x.className = 'x'; x.textContent = '×'; x.title = opts.numbered ? 'Send back to master' : 'Delete';
  x.addEventListener('click', (e) => {
    e.stopPropagation();
    if (opts.numbered) moveItem(item.id, state.master, state.master.length);
    else { const f = findItem(item.id); if (f) { f.list.splice(f.idx, 1); commit(); } }
  });
  li.appendChild(x);

  li.addEventListener('dragstart', (e) => {
    li.classList.add('dragging');
    e.dataTransfer.setData('text/plain', item.id);
    e.dataTransfer.effectAllowed = 'move';
  });
  li.addEventListener('dragend', () => li.classList.remove('dragging'));
  return li;
}

function render() {
  masterList.innerHTML = '';
  if (!state.master.length) masterList.appendChild(hint('No backlog tasks.\nAdd one above.'));
  state.master.forEach(item => masterList.appendChild(taskEl(item, { numbered: false, checkbox: false })));

  dailyList.innerHTML = '';
  if (!state.daily.length) dailyList.appendChild(hint('Drag tasks here from the\nmaster list to plan your day.'));
  state.daily.forEach((item, index) => dailyList.appendChild(taskEl(item, { numbered: true, checkbox: true, index })));

  el('masterCount').textContent = state.master.length ? `${state.master.length}` : '';
  el('dailyCount').textContent = state.daily.length ? `${state.daily.length}` : '';
}
function hint(text) { const d = document.createElement('div'); d.className = 'empty-hint'; d.textContent = text; return d; }

function completeDaily(id, li) {
  li.classList.add('done');
  setTimeout(() => {
    const f = findItem(id);
    if (f && f.list === state.daily) { f.list.splice(f.idx, 1); commit(); }
  }, 380);
}

/* ---- drag/drop targets ---- */
function afterElement(container, y) {
  const els = [...container.querySelectorAll('.task:not(.dragging)')];
  let closest = { offset: -Infinity, el: null };
  for (const child of els) {
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height / 2;
    if (offset < 0 && offset > closest.offset) closest = { offset, el: child };
  }
  return closest.el;
}
function setupDropZone(ul, targetList) {
  ul.addEventListener('dragover', (e) => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move'; ul.classList.add('dragover');
  });
  ul.addEventListener('dragleave', (e) => { if (e.target === ul) ul.classList.remove('dragover'); });
  ul.addEventListener('drop', (e) => {
    e.preventDefault(); ul.classList.remove('dragover');
    const id = e.dataTransfer.getData('text/plain'); if (!id) return;
    const after = afterElement(ul, e.clientY);
    let idx = targetList.length;
    if (after) idx = targetList.findIndex(t => t.id === after.dataset.id);
    moveItem(id, targetList, idx);
  });
}
setupDropZone(masterList, state.master);
setupDropZone(dailyList, state.daily);

/* ---- add task ---- */
function addMaster() {
  const inp = el('masterInput'); const text = inp.value.trim();
  if (!text) return;
  state.master.push(mk(text)); inp.value = ''; commit();
}
el('masterAdd').addEventListener('click', addMaster);
el('masterInput').addEventListener('keydown', (e) => { if (e.key === 'Enter') addMaster(); });

/* ---- dice result overlay ---- */
const overlay = el('overlay');
Dice.onResult((value) => {
  const n = state.daily.length;
  if (value >= 1 && value <= n) showResult(value, state.daily[value - 1]);
  else showResult(value, null);
});

function showResult(value, item) {
  el('ovRoll').textContent = `You rolled ${value}`;
  const pick = el('ovPick'), btns = el('ovBtns'); btns.innerHTML = '';
  if (item) {
    pick.textContent = item.text; pick.classList.remove('again');
    flashTask(item.id);
    const done = btn('Mark done ✓', 'primary', () => { closeOverlay(); completeById(item.id); });
    const close = btn('Close', 'ghost', closeOverlay);
    btns.append(done, close);
  } else {
    pick.textContent = `No task #${value} — roll again!`; pick.classList.add('again');
    const again = btn('Roll again ⤴', 'accent', () => { closeOverlay(); setTimeout(Dice.roll, 120); });
    const close = btn('Close', 'ghost', closeOverlay);
    btns.append(again, close);
  }
  overlay.classList.add('show');
}
function btn(label, cls, fn) { const b = document.createElement('button'); b.className = cls; b.textContent = label; b.addEventListener('click', fn); return b; }
function closeOverlay() { overlay.classList.remove('show'); }
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeOverlay(); });
function completeById(id) {
  const f = findItem(id);
  if (f && f.list === state.daily) { f.list.splice(f.idx, 1); commit(); }
}
function flashTask(id) {
  const li = dailyList.querySelector(`[data-id="${id}"]`);
  if (li) { li.classList.add('highlight'); setTimeout(() => li.classList.remove('highlight'), 1600); }
}
function flashDie(msg) { const lead = el('diceLead'); const old = lead.textContent; lead.textContent = msg; setTimeout(() => { lead.textContent = old; }, 1400); }

el('rollBtn').addEventListener('click', Dice.roll);

/* ===================================================================
   AUTH + USER MANAGEMENT
   =================================================================== */
const loginScreen = el('loginScreen');
function showLogin() { loginScreen.classList.add('show'); }
function hideLogin() { loginScreen.classList.remove('show'); }

let currentUser = null;
function setUserBar(me) {
  currentUser = me;
  el('whoName').textContent = me.username;
  document.body.classList.toggle('is-admin', me.role === 'admin');
}

el('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  el('loginErr').textContent = '';
  const username = el('loginUser').value.trim();
  const password = el('loginPass').value;
  try {
    const r = await fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }) });
    if (r.status === 401) { el('loginErr').textContent = 'Invalid username or password'; return; }
    if (!r.ok) { el('loginErr').textContent = 'Login failed (' + r.status + ')'; return; }
    const me = await r.json();
    el('loginPass').value = '';
    await startApp(me);
  } catch (_) { el('loginErr').textContent = 'Network error'; }
});

el('logoutBtn').addEventListener('click', async () => {
  try { await fetch('/api/logout', { method: 'POST' }); } catch (_) {}
  location.reload();
});

/* ---- admin: user management modal ---- */
const usersModal = el('usersModal');
el('usersBtn').addEventListener('click', async () => { el('usersErr').textContent = ''; usersModal.classList.add('show'); await renderUsers(); });
el('usersClose').addEventListener('click', () => usersModal.classList.remove('show'));
usersModal.addEventListener('click', (e) => { if (e.target === usersModal) usersModal.classList.remove('show'); });

async function renderUsers() {
  const list = el('usersList'); list.innerHTML = '';
  let users = [];
  try { const r = await fetch('/api/users'); if (!r.ok) throw new Error('HTTP ' + r.status); users = await r.json(); }
  catch (_) { el('usersErr').textContent = 'Failed to load users'; return; }
  for (const u of users) {
    const li = document.createElement('li');
    const name = document.createElement('span'); name.className = 'uname'; name.textContent = u.username;
    const role = document.createElement('span'); role.className = 'urole'; role.textContent = u.role;
    li.append(name, role);
    if (currentUser && u.username === currentUser.username) {
      const you = document.createElement('span'); you.className = 'badge-you'; you.textContent = 'you';
      li.append(you);
    } else {
      const rm = document.createElement('button'); rm.className = 'rm'; rm.textContent = 'Remove';
      rm.addEventListener('click', () => removeUser(u.id));
      li.append(rm);
    }
    list.append(li);
  }
}
el('addUserForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  el('usersErr').textContent = '';
  const username = el('newUser').value.trim();
  const password = el('newPass').value;
  const role = el('newRole').value;
  if (!username || password.length < 6) { el('usersErr').textContent = 'Username required, password ≥ 6 chars'; return; }
  const r = await fetch('/api/users', { method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username, password, role }) });
  if (r.status === 409) { el('usersErr').textContent = 'That username already exists'; return; }
  if (!r.ok) { el('usersErr').textContent = 'Could not create user (' + r.status + ')'; return; }
  el('newUser').value = ''; el('newPass').value = '';
  await renderUsers();
});
async function removeUser(id) {
  el('usersErr').textContent = '';
  const r = await fetch('/api/users/' + id, { method: 'DELETE' });
  if (!r.ok) { el('usersErr').textContent = 'Could not remove user (' + r.status + ')'; return; }
  await renderUsers();
}

/* ---- start the app once authenticated ---- */
async function startApp(me) {
  hideLogin();
  setUserBar(me);
  try {
    const r = await fetch(API);
    if (r.status === 401) { showLogin(); return; }
    if (r.ok) {
      const data = await r.json();
      if (data.seeded) applyState({ master: data.master, daily: data.daily });
      else { applyState({ master: SEED.map(mk), daily: [] }); save(); }   // first login: seed demo tasks
    }
  } catch (err) { console.warn('state load failed', err); }
  render(); syncDie();
}

/* expose minimal hooks for automated verification */
window.__app = { state, dieForCount, moveItem, completeById, syncDie,
                 get dailyCount() { return state.daily.length; },
                 get user() { return currentUser; } };
window.__dice = Dice;

/* ---- boot: resume session if present, else show the login screen ---- */
const me = await (async () => {
  try { const r = await fetch('/api/me'); return r.ok ? await r.json() : null; } catch (_) { return null; }
})();
if (me) await startApp(me);
else { render(); syncDie(); showLogin(); }
</script>
