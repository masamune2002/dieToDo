# fly.toml app configuration file generated for die-todo on 2026-06-21T22:44:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'die-todo'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[env]
  DATABASE_URL = 'sqlite:///data/todo.db?mode=rwc'
  PORT = '3000'

[[mounts]]
  source = 'todo_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
